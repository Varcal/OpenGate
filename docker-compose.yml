name: opengate

services:

  # ── SQL Server 2022 ──────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "OpenGate_Dev!23"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa
          -P "OpenGate_Dev!23" -No -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── OpenGate Identity Server ─────────────────────────────────────────────────
  opengate:
    build:
      context: .
      dockerfile: samples/OpenGate.Sample.Basic/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override connection string to point at the compose SQL Server service
      ConnectionStrings__OpenGate: >-
        Server=sqlserver,1433;Database=OpenGateIdentity;
        User Id=sa;Password=OpenGate_Dev!23;TrustServerCertificate=true
      OpenGate__IssuerUri: "http://localhost:5001"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:

